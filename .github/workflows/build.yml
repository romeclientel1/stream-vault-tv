name: Build StreamVault TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/StreamVault-TV.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-TV-APK
          path: app/build/outputs/apk/release/StreamVault-TV.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: StreamVault TV v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/StreamVault-TV.apk
          body: |
            StreamVault TV App for Fire TV and Firestick.
            Install via Downloader app using the APK link in Assets below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
